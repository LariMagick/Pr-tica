<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Teste</title>
  </head>
  <body>
    <form action="sla.html" method="post">
      <p>
        <label for="User">Usuario:</label>
        <input
          id="User"
          type="Text"
          name="Usuario"
          placeholder="LariMagick"
          required
        />
      </p>
      <p>
        <label for="Pss">Senha:</label>
        <input id="Pss" type="password" name="Senha" required />
      </p>
      <p>
        <button type="submit">Enviar</button>
      </p>
    </form>
    <form action="sla.html" method="post">
      <fieldset>
        <legend>Qual seu ponei favorito</legend>
        <p>
          <label for="RD">Rainbow Dash</label>
          <input id="RD" type="radio" name="Ponei" value="RD" checked />
        </p>
        <p>
          <label for="TS">Twilight Sparkle</label>
          <input id="TS" type="radio" name="Ponei" value="TS" />
        </p>
        <p>
          <label for="PP">Pink Pie</label>
          <input id="PP" type="radio" name="Ponei" value="PP" />
        </p>
      </fieldset>
      <fieldset>
        <legend>Sucos Preferidos</legend>
        <p>
          <label for="Laranja">Laranja</label>
          <input id="Laranja" name="Laranja" type="checkbox" />
        </p>
        <p>
          <label for="Morango">Morango</label>
          <input id="Morango" name="Morango" type="checkbox" />
        </p>
        <p>
          <label for="Uva">Uva</label>
          <input id="Uva" name="Uva" type="checkbox" />
        </p>
        <p>
          <label for="Maça">Maça</label>
          <input id="Maça" name="Maça" type="checkbox" />
        </p>
      </fieldset>
      <button type="submit">Enviar</button>
    </form>
    <form action="sla.html" method="post">
      <p>
        <label for="Email">Email:</label
        ><input
          id="Email"
          type="email"
          placeholder="Larimagick@email.com"
          required
        />
      </p>
      <p>
        <label for="Site">Site:</label
        ><input id="Site" type="url" placeholder="www.Larimagick.com" />
      </p>
      <p>
        <label for="Celular">Celular:</label
        ><input id="Celular" type="tel" placeholder="12345678" required />
      </p>
      <p><label for="Cor">Cor:</label><input id="Cor" type="color" /></p>
      <button type="submit">Atualizar</button>
    </form>
    <form action="sla.html" method="post">
      <h3>Comida favorita</h3>
      <p>
        <label for="Comida">Minha comida favorita é:</label>
        <select id="Comida" name="Comida" required>
          <option value="" hidden>Comida</option>
          <option value="Macaron">Macaron</option>
          <option value="Pizza">Pizza</option>
          <option value="Pedra">Pedra</option>
          <option value="Madeira">Madeira</option>
          <option value="Bolo de Cake">Bolo de Cake</option>
        </select>
      </p>
      <p>
        <button type="submit">Enviar</button>
      </p>
    </form>
    <form action="sla.html" method="post">
      <fieldset>
        <legend>Informaçoes</legend>
        <p>
          <label for="nome">Nome</label>
          <input id="nome" name="nome" required type="text" />
        </p>
        <p>
          <label for="idade">Idade</label>
          <input id="idade" name="idade" required type="number" />
        </p>
      </fieldset>
      <fieldset>
        <legend>Comentario</legend>
        <p>
          <label for="email">Email</label>
          <input id="email" name="email" type="email" />
        </p>
        <p>
          <label for="comentario">Comentario</label>
          <textarea
            id="comentario"
            name="comentario"
            type="text"
            maxlength="300"
          >
          </textarea>
        </p>
      </fieldset>
      <p>
        <button type="submit">Envina</button>
      </p>
    </form>
    <form action="sla.html" method="post">
      <h1>Eu não aguento mais!</h1>
      <p>
        <label for="user2">Username</label>
        <input id="user2" name="user2" type="text" placeholder="LariMagick" />
      </p>
      <p>
        <label for="email2">Email</label>
        <input
          id="email2"
          name="email2"
          type="email"
          placeholder="LariMagick@email.com"
          required
        />
      </p>
      <p>
        <label for="celular2">Celular</label>
        <input
          id="celular2"
          name="celular2"
          type="tel"
          placeholder="872831913"
          required
        />
      </p>
      <p>
        <label for="comentario2">Comentario</label>
        <textarea id="comentario2" name="comentario2" maxlength="300">
        </textarea>
      </p>
    </form>
  </body>
</html>
